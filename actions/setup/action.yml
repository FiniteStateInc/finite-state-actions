name: 'Finite State Setup'
description: 'Authenticate and configure Finite State context for downstream actions'
author: 'Finite State Inc.'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  api-token:
    description: 'Finite State API token'
    required: true
  domain:
    description: 'Finite State platform domain'
    required: false
    default: 'app.finitestate.io'
  project-id:
    description: 'Project ID (UUID) or exact project name. Names are resolved to IDs automatically.'
    required: false
  version-id:
    description: 'Default version ID for subsequent actions'
    required: false
outputs:
  org-name:
    description: 'Organization name'
  user:
    description: 'Authenticated username'
  project-id:
    description: 'Project ID (echoed or resolved)'
  version-id:
    description: 'Version ID (echoed or resolved)'
runs:
  using: 'composite'
  steps:
    - name: Run setup
      shell: bash
      run: node '${{ github.action_path }}/dist/index.js'
      env:
        INPUT_API-TOKEN: ${{ inputs.api-token }}
        INPUT_DOMAIN: ${{ inputs.domain }}
        INPUT_PROJECT-ID: ${{ inputs.project-id }}
        INPUT_VERSION-ID: ${{ inputs.version-id }}
    - name: Install fs-cli
      shell: bash
      run: curl -fsSL https://raw.githubusercontent.com/FiniteStateInc/customer-resources/main/02-ci-cd-automation/fs-cli/install.sh | sh
